<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filebridge — แปลงไฟล์ทุกฟอร์แมต</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

	<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg-0: #0B0D13;
            --bg-1: radial-gradient(1100px 600px at 15% -10%, #1B2036 0%, transparent 60%),
                     radial-gradient(900px 500px at 110% 10%, #1A2A2C 0%, transparent 55%),
                     #0B0D13;
            --surface: #14161F;
            --surface-2: #1A1D29;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.16);
            --ink: #EEEFF4;
            --muted: #8B92A6;
            --accent: #FFB020;
            --accent-2: #5B8DEF;
            --success: #3DDC97;
            --radius: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background: var(--bg-1);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 20px;
            color: var(--ink);
        }

        .mono { font-family: 'IBM Plex Mono', monospace; }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px 32px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
        }

        .eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.16em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }

        .subhead {
            font-size: 14px;
            font-weight: 400;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* --- Bridge signature element --- */
        .bridge {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .bridge-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-strong);
            background: var(--surface-2);
            color: var(--muted);
            white-space: nowrap;
            min-width: 76px;
            text-align: center;
            transition: all 0.25s ease;
        }

        .bridge-tag.filled.source {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(255, 176, 32, 0.08);
        }

        .bridge-tag.filled.target {
            color: var(--accent-2);
            border-color: var(--accent-2);
            background: rgba(91, 141, 239, 0.1);
        }

        .bridge-span {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-strong), var(--border-strong));
            position: relative;
        }

        .bridge-span.active {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        .bridge-span::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            width: 6px;
            height: 6px;
            border-top: 1.5px solid var(--border-strong);
            border-right: 1.5px solid var(--border-strong);
            transform: translateY(-50%) rotate(45deg);
        }

        .bridge-span.active::after {
            border-color: var(--accent-2);
        }

        /* --- Form elements --- */
        input[type="file"] { display: none; }

        .dropzone {
            position: relative;
            border-radius: 14px;
            padding: 34px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: border-color 0.2s ease, background 0.2s ease;
            margin-bottom: 22px;
        }

        .dropzone::before,
        .dropzone::after,
        .corner-tl, .corner-br { display: none; }

        .dropzone .corners span {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--border-strong);
            transition: border-color 0.2s ease;
        }
        .dropzone .corners span:nth-child(1) { top: 10px; left: 10px; border-top: 2px solid; border-left: 2px solid; }
        .dropzone .corners span:nth-child(2) { top: 10px; right: 10px; border-top: 2px solid; border-right: 2px solid; }
        .dropzone .corners span:nth-child(3) { bottom: 10px; left: 10px; border-bottom: 2px solid; border-left: 2px solid; }
        .dropzone .corners span:nth-child(4) { bottom: 10px; right: 10px; border-bottom: 2px solid; border-right: 2px solid; }

        .dropzone:hover,
        .dropzone.dragover {
            background: #1F2333;
            border-color: rgba(255,255,255,0.12);
        }

        .dropzone:hover .corners span,
        .dropzone.dragover .corners span {
            border-color: var(--accent);
        }

        .dropzone svg { color: var(--muted); }

        .dz-title {
            display: block;
            margin-top: 12px;
            font-weight: 600;
            font-size: 14.5px;
            color: var(--ink);
        }

        .dz-hint {
            display: block;
            margin-top: 4px;
            font-size: 12.5px;
            color: var(--muted);
        }

        .field { margin-bottom: 20px; text-align: left; }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--ink);
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="text"]::placeholder { color: #565C6E; }

        input[type="text"]:focus {
            border-color: var(--accent-2);
        }

        input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .select-wrap { position: relative; }

        .options-list {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            max-height: 260px;
            overflow-y: auto;
            background: #191C27;
            border: 1px solid var(--border-strong);
            border-radius: 12px;
            z-index: 100;
            text-align: left;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }

        .options-list::-webkit-scrollbar { width: 8px; }
        .options-list::-webkit-scrollbar-thumb { background: #333747; border-radius: 8px; }

        .option-group {
            padding: 9px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--muted);
            background: #14161F;
            text-transform: uppercase;
            position: sticky;
            top: 0;
        }

        .option-item {
            padding: 10px 14px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            color: #C7CBDA;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .option-item:hover {
            background: rgba(91, 141, 239, 0.14);
            color: var(--ink);
        }

        .btn-convert {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #1A1000;
            border: none;
            border-radius: 10px;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 15.5px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .btn-convert:hover:not(:disabled) {
            background: #FFC04D;
            transform: translateY(-1px);
        }

        .btn-convert:disabled {
            background: #33384A;
            color: #6B7185;
            cursor: not-allowed;
            transform: none;
        }

        .btn-convert:focus-visible,
        input[type="text"]:focus-visible,
        .dropzone:focus-visible {
            outline: 2px solid var(--accent-2);
            outline-offset: 2px;
        }

        .progress-wrap { display: none; margin-top: 22px; text-align: left; }

        .status-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--accent-2);
            margin-bottom: 8px;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: var(--surface-2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 10px;
            transition: width 0.35s ease;
        }

        .result-wrap {
            display: none;
            margin-top: 22px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(61, 220, 151, 0.08);
            border: 1px solid rgba(61, 220, 151, 0.3);
            text-align: center;
        }

        .result-wrap p {
            font-size: 14px;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 12px;
        }

        .btn-download {
            display: inline-block;
            padding: 10px 22px;
            background: var(--success);
            color: #08201A;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .btn-download:hover { background: #58E6AA; }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; border-radius: 14px; }
            h1 { font-size: 22px; }
            .bridge-tag { font-size: 11px; min-width: 64px; padding: 7px 8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="eyebrow">File Converter</div>
        <h1>Filebridge</h1>
        <p class="subhead">แปลงไฟล์ข้ามฟอร์แมต — วิดีโอ เสียง รูปภาพ ไฟล์ RAW เอกสาร และอีบุ๊ก ในที่เดียว</p>

        <div class="bridge">
            <div class="bridge-tag source" id="sourceTag">ไฟล์ต้นทาง</div>
            <div class="bridge-span" id="bridgeSpan"></div>
            <div class="bridge-tag target" id="targetTag">ฟอร์แมตปลายทาง</div>
        </div>

        <input type="file" id="fileInput" accept="*/*">

        <div class="dropzone" id="dropBox" tabindex="0" role="button" aria-label="เลือกไฟล์เพื่อแปลง">
            <div class="corners"><span></span><span></span><span></span><span></span></div>
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span class="dz-title" id="fileName">ลากไฟล์มาวาง หรือคลิกเพื่อเลือก</span>
            <span class="dz-hint">รองรับไฟล์แทบทุกประเภท</span>
        </div>

        <div class="field">
            <label for="outputFileName">ชื่อไฟล์ผลลัพธ์</label>
            <input type="text" id="outputFileName" placeholder="เช่น my-new-file" disabled>
        </div>

        <div class="field select-wrap">
            <label for="formatSearch">แปลงเป็นฟอร์แมต</label>
            <input type="text" id="formatSearch" placeholder="เลือกไฟล์ก่อน เพื่อดูฟอร์แมตที่แปลงได้" autocomplete="off" disabled>
            <div class="options-list" id="optionsList"></div>
        </div>

        <button class="btn-convert" id="convertBtn" disabled>แปลงไฟล์</button>

        <div class="progress-wrap" id="progressContainer">
            <div class="status-text" id="statusText">กำลังแปลงไฟล์... 0%</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="result-wrap" id="resultContainer">
            <p>แปลงไฟล์สำเร็จ</p>
            <a href="#" class="btn-download" id="downloadBtn">ดาวน์โหลดไฟล์</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const dropBox = document.getElementById('dropBox');
        const outputFileName = document.getElementById('outputFileName');
        const downloadBtn = document.getElementById('downloadBtn');
        const formatSearch = document.getElementById('formatSearch');
        const optionsList = document.getElementById('optionsList');
        const sourceTag = document.getElementById('sourceTag');
        const targetTag = document.getElementById('targetTag');
        const bridgeSpan = document.getElementById('bridgeSpan');

        let selectedFile = null;
        let objectUrl = null;

        const formatGroups = {
            "วิดีโอ (Video)": ["mp4", "mkv", "avi", "mov", "wmv", "flv", "webm", "m4v", "3gp", "mpeg", "mpg", "ts"],
            "เสียง (Audio)": ["mp3", "wav", "aac", "m4a", "flac", "ogg", "wma", "alac", "aiff", "amr"],
            "รูปภาพทั่วไป (Image)": ["jpg", "jpeg", "jpe", "jfif", "pjpeg", "pjp", "png", "apng", "gif", "bmp", "dib", "rle", "tiff", "tif", "webp", "svg", "svgz", "ico", "cur", "heic", "heif", "avif", "jxl", "jp2", "j2k", "jpf", "jpx", "jpm", "mj2", "wdp", "hdp", "jxr", "dds", "ktx", "ktx2", "astc", "basis", "psd", "psb", "ai", "eps", "indd"],
            "รูปภาพจากกล้อง (Camera RAW)": ["raw", "dng", "cr2", "cr3", "crw", "nef", "nrw", "arw", "sr2", "srf", "orf", "rw2", "raf", "pef", "srw", "x3f", "3fr", "fff", "iiq", "k25", "kdc", "mef", "mos", "mrw", "erf", "rwl", "bay", "cap", "dcs", "dcr", "drf", "eip", "kqp", "mdc", "pxn", "pxr", "qtk", "sti", "gpr", "ciff"],
            "เอกสาร (Document & PDF)": ["pdf", "fdf", "xfdf", "doc", "docx", "docm", "dot", "dotx", "dotm", "xls", "xlsx", "xlsm", "xlsb", "xlt", "xltx", "xltm", "ppt", "pptx", "pptm", "pps", "ppsx", "ppsm", "pot", "potx", "potm", "txt", "text", "log", "rtf", "odt", "ott", "odm", "ods", "ots", "odp", "otp", "odg", "otg", "odf", "odb"],
            "ข้อมูลและการแสดงผล (Data & Code)": ["csv", "tsv", "tab", "md", "markdown", "tex", "latex", "ltx", "bib", "wpd", "wps", "wks", "wk1", "wk3", "wk4", "123", "pages", "numbers", "key", "pub", "vsd", "vsdx", "one", "onetoc2", "note", "xml", "json", "yaml", "yml", "ini", "cfg", "conf", "properties", "resx", "plist", "sql", "db", "sqlite", "sqlite3", "accdb", "mdb"],
            "อีบุ๊ค (eBook)": ["epub", "mobi", "azw", "azw3", "azw4", "kfx", "fb2", "djvu", "djv", "xps", "oxps", "abw", "zabw", "sxw", "sxc", "sxi", "sxg", "stw", "uot", "uof", "uos", "uos2"]
        };

        const conversionRules = {
            "วิดีโอ (Video)": ["วิดีโอ (Video)", "เสียง (Audio)"],
            "เสียง (Audio)": ["เสียง (Audio)"],
            "รูปภาพทั่วไป (Image)": ["รูปภาพทั่วไป (Image)"],
            "รูปภาพจากกล้อง (Camera RAW)": ["รูปภาพทั่วไป (Image)", "รูปภาพจากกล้อง (Camera RAW)"],
            "เอกสาร (Document & PDF)": ["เอกสาร (Document & PDF)"],
            "ข้อมูลและการแสดงผล (Data & Code)": ["ข้อมูลและการแสดงผล (Data & Code)"],
            "อีบุ๊ค (eBook)": ["อีบุ๊ค (eBook)"]
        };

        const mimeTypes = {
            'mp4': 'video/mp4', 'mkv': 'video/x-matroska', 'webm': 'video/webm',
            'mp3': 'audio/mpeg', 'wav': 'audio/wav', 'ogg': 'audio/ogg', 'm4a': 'audio/mp4',
            'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'png': 'image/png', 'gif': 'image/gif',
            'webp': 'image/webp', 'svg': 'image/svg+xml', 'pdf': 'application/pdf',
            'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        };

        function getFileGroup(extension) {
            for (const [group, exts] of Object.entries(formatGroups)) {
                if (exts.includes(extension.toLowerCase())) return group;
            }
            return null;
        }

        for (const [groupName, extensions] of Object.entries(formatGroups)) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'option-group';
            groupDiv.dataset.group = groupName;
            groupDiv.textContent = groupName;
            optionsList.appendChild(groupDiv);

            extensions.forEach(ext => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'option-item';
                itemDiv.dataset.value = ext;
                itemDiv.dataset.group = groupName;
                itemDiv.dataset.allowed = "false";
                itemDiv.textContent = `.${ext}`;
                itemDiv.style.display = 'none';
                optionsList.appendChild(itemDiv);

                itemDiv.addEventListener('click', () => {
                    formatSearch.value = `.${ext}`;
                    optionsList.style.display = 'none';
                    updateTargetTag(ext);
                    checkReadyState();
                });
            });
        }

        function filterAllowedFormats(sourceExtension) {
            const sourceGroup = getFileGroup(sourceExtension);
            const allowedGroups = sourceGroup && conversionRules[sourceGroup]
                                    ? conversionRules[sourceGroup]
                                    : Object.keys(formatGroups);

            const items = optionsList.querySelectorAll('.option-item');
            const groups = optionsList.querySelectorAll('.option-group');

            items.forEach(item => {
                const targetExt = item.dataset.value;
                const targetGroup = item.dataset.group;
                if (allowedGroups.includes(targetGroup) && targetExt !== sourceExtension.toLowerCase()) {
                    item.dataset.allowed = "true";
                    item.style.display = 'block';
                } else {
                    item.dataset.allowed = "false";
                    item.style.display = 'none';
                }
            });

            groups.forEach(group => {
                group.style.display = allowedGroups.includes(group.dataset.group) ? 'block' : 'none';
            });
        }

        function updateSourceTag(ext) {
            if (ext) {
                sourceTag.textContent = `.${ext.toLowerCase()}`;
                sourceTag.classList.add('filled');
            } else {
                sourceTag.textContent = 'ไฟล์ต้นทาง';
                sourceTag.classList.remove('filled');
            }
            refreshBridgeSpan();
        }

        function updateTargetTag(ext) {
            if (ext) {
                targetTag.textContent = `.${ext.toLowerCase()}`;
                targetTag.classList.add('filled');
            } else {
                targetTag.textContent = 'ฟอร์แมตปลายทาง';
                targetTag.classList.remove('filled');
            }
            refreshBridgeSpan();
        }

        function refreshBridgeSpan() {
            const bothFilled = sourceTag.classList.contains('filled') && targetTag.classList.contains('filled');
            bridgeSpan.classList.toggle('active', bothFilled);
        }

        formatSearch.addEventListener('focus', () => {
            optionsList.style.display = 'block';
        });

        formatSearch.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().replace('.', '');
            const items = optionsList.querySelectorAll('.option-item');
            items.forEach(item => {
                item.style.display = (item.dataset.allowed === "true" && item.dataset.value.toLowerCase().includes(searchTerm)) ? 'block' : 'none';
            });
            const exactMatch = [...items].find(i => i.dataset.allowed === "true" && i.dataset.value.toLowerCase() === searchTerm);
            updateTargetTag(exactMatch ? exactMatch.dataset.value : null);
            checkReadyState();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.select-wrap')) {
                optionsList.style.display = 'none';
            }
        });

        dropBox.addEventListener('click', () => fileInput.click());
        dropBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
        });
        dropBox.addEventListener('dragover', (e) => { e.preventDefault(); dropBox.classList.add('dragover'); });
        dropBox.addEventListener('dragleave', () => dropBox.classList.remove('dragover'));
        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            dropBox.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileChange(e.dataTransfer.files[0]);
            }
        });

        function handleFileChange(file) {
            if (file) {
                selectedFile = file;
                fileNameDisplay.textContent = selectedFile.name;

                const lastDotIndex = selectedFile.name.lastIndexOf('.');
                const extension = lastDotIndex !== -1 ? selectedFile.name.substring(lastDotIndex + 1) : '';
                outputFileName.value = lastDotIndex !== -1 ? selectedFile.name.substring(0, lastDotIndex) : selectedFile.name;
                outputFileName.disabled = false;

                formatSearch.value = '';
                formatSearch.disabled = false;
                formatSearch.placeholder = 'พิมพ์ค้นหา เช่น mp4, jpg...';
                filterAllowedFormats(extension);
                updateSourceTag(extension);
                updateTargetTag(null);

                progressContainer.style.display = 'none';
                resultContainer.style.display = 'none';
                progressBar.style.width = '0%';

                if (objectUrl) URL.revokeObjectURL(objectUrl);
            } else {
                selectedFile = null;
                fileNameDisplay.textContent = 'ลากไฟล์มาวาง หรือคลิกเพื่อเลือก';
                outputFileName.value = '';
                outputFileName.disabled = true;
                formatSearch.value = '';
                formatSearch.disabled = true;
                updateSourceTag(null);
                updateTargetTag(null);
            }
            checkReadyState();
        }

        fileInput.addEventListener('change', (e) => handleFileChange(e.target.files[0]));

        function checkReadyState() {
            const formatSelected = formatSearch.value.replace('.', '').trim();
            convertBtn.disabled = !(selectedFile && formatSelected);
        }

        const { createFFmpeg, fetchFile } = FFmpeg;
// โหลด FFmpeg (ตั้งค่า log เป็น true เพื่อดูการทำงานใน Console)
const ffmpeg = createFFmpeg({ log: true });

convertBtn.addEventListener('click', async () => {
    const targetFormat = formatSearch.value.replace('.', '').trim().toLowerCase();
    if (!selectedFile || !targetFormat) return;

    // ล็อก UI ระหว่างทำงาน
    convertBtn.disabled = true;
    fileInput.disabled = true;
    formatSearch.disabled = true;
    outputFileName.disabled = true;
    dropBox.style.pointerEvents = 'none';

    progressContainer.style.display = 'block';
    resultContainer.style.display = 'none';
    progressBar.style.width = '0%';
    statusText.textContent = 'กำลังเตรียมระบบแปลงไฟล์... (อาจใช้เวลาโหลดครั้งแรกเล็กน้อย)';

    try {
        // โหลด Core ของ FFmpeg ถ้ายังไม่ได้โหลด
        if (!ffmpeg.isLoaded()) {
            await ffmpeg.load();
        }

        const inputFileName = `input_${selectedFile.name}`;
        const outputFileNameExt = `output.${targetFormat}`;

        // เขียนไฟล์ต้นฉบับลงในระบบไฟล์จำลองของเบราว์เซอร์
        ffmpeg.FS('writeFile', inputFileName, await fetchFile(selectedFile));

        // อัปเดต Progress Bar ตามความคืบหน้าจริงของ FFmpeg
        ffmpeg.setProgress(({ ratio }) => {
            let percent = Math.round(ratio * 100);
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;
            
            progressBar.style.width = `${percent}%`;
            statusText.textContent = `กำลังแปลงไฟล์เป็น .${targetFormat}... ${percent}%`;
        });

        // รันคำสั่งแปลงไฟล์ (เช่น แปลงเป็น ogg จะเป็นการดึงเฉพาะเสียงออกมาโดยอัตโนมัติ)
        await ffmpeg.run('-i', inputFileName, outputFileNameExt);

        // ดึงไฟล์ผลลัพธ์ออกมา
        const data = ffmpeg.FS('readFile', outputFileNameExt);
        const newMimeType = mimeTypes[targetFormat] || 'application/octet-stream';
        
        // สร้าง Blob จากข้อมูลที่ถูกแปลงแล้วจริงๆ
        const blob = new Blob([data.buffer], { type: newMimeType });

        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(blob);
        
        let finalName = outputFileName.value.trim() || 'converted_file';
        downloadBtn.href = objectUrl;
        downloadBtn.download = `${finalName}.${targetFormat}`;

        // เคลียร์ไฟล์จำลองทิ้งเพื่อคืนพื้นที่หน่วยความจำ
        ffmpeg.FS('unlink', inputFileName);
        ffmpeg.FS('unlink', outputFileNameExt);

        progressContainer.style.display = 'none';
        resultContainer.style.display = 'block';

    } catch (error) {
        console.error("Conversion Error: ", error);
        statusText.textContent = 'เกิดข้อผิดพลาด: ฟอร์แมตนี้อาจยังไม่รองรับหรือไฟล์มีปัญหา';
        progressBar.style.width = '0%';
    } finally {
        // ปลดล็อก UI
        fileInput.disabled = false;
        formatSearch.disabled = false;
        outputFileName.disabled = false;
        convertBtn.disabled = false;
        convertBtn.textContent = 'แปลงไฟล์อีกไฟล์';
        dropBox.style.pointerEvents = 'auto';
    }
});
    </script>
</body>
</html>
