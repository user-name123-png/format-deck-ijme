<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media Converter</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #A29BFE;
            --bg-gradient: linear-gradient(135deg, #74EBD5 0%, #9FACE6 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2D3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .converter-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .converter-card h1 {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .converter-card p {
            font-weight: 300;
            margin-bottom: 30px;
            font-size: 14px;
            color: #4a4a4a;
        }

        #fileInput {
            display: none;
        }

        .file-upload-box {
            border: 2px dashed var(--primary);
            border-radius: 16px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .file-upload-box:hover, .file-upload-box.dragover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            border-color: #5A4BDE;
        }

        .file-upload-box span {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            color: var(--primary);
            word-break: break-word;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .custom-select-wrapper {
            position: relative;
        }

        .options-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-top: 5px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 100;
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .options-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .options-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 8px;
        }

        .option-group {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            background: #f1f2f6;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .option-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        .option-item:hover {
            background: var(--secondary);
            color: white;
        }

        .btn-convert {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-convert:hover {
            background: #5A4BDE;
            transform: translateY(-2px);
        }

        .btn-convert:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            display: none;
            margin-top: 25px;
            text-align: left;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .result-container {
            display: none;
            margin-top: 20px;
        }

        .btn-download {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 24px;
            background: #00b894;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-download:hover {
            background: #00a383;
        }

        @media (max-width: 500px) {
            .converter-card {
                padding: 25px 20px;
                border-radius: 16px;
            }
            .file-upload-box {
                padding: 30px 15px;
            }
            input[type="text"], .btn-convert {
                font-size: 15px;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>แปลงนามสกุลไฟล์</h1>
        <p>รองรับวิดีโอ, เสียง, รูปภาพ, รูป RAW และเอกสาร</p>

        <input type="file" id="fileInput" accept="*/*">
        
        <div class="file-upload-box" id="dropBox">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span id="fileName">คลิกเพื่อเลือกไฟล์ หรือลากมาวางที่นี่</span>
        </div>

        <div class="form-group">
            <label for="outputFileName">ตั้งชื่อไฟล์ใหม่ (ไม่ต้องใส่จุดนามสกุล)</label>
            <input type="text" id="outputFileName" placeholder="เช่น my_new_file">
        </div>

        <div class="form-group custom-select-wrapper">
            <label for="formatSearch">ค้นหาหรือเลือกนามสกุลไฟล์ที่ต้องการแปลง</label>
            <input type="text" id="formatSearch" placeholder="พิมพ์ค้นหา (เช่น mp4, jpg)..." autocomplete="off" disabled>
            <div class="options-list" id="optionsList"></div>
        </div>

        <button class="btn-convert" id="convertBtn" disabled>เริ่มการแปลงไฟล์</button>

        <div class="progress-container" id="progressContainer">
            <div class="status-text" id="statusText">กำลังเตรียมการ... 0%</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <p>✅ แปลงไฟล์สำเร็จ!</p>
            <a href="#" class="btn-download" id="downloadBtn">ดาวน์โหลดไฟล์</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const dropBox = document.getElementById('dropBox');
        const outputFileName = document.getElementById('outputFileName');
        const downloadBtn = document.getElementById('downloadBtn');
        const formatSearch = document.getElementById('formatSearch');
        const optionsList = document.getElementById('optionsList');

        let selectedFile = null;
        let objectUrl = null; 

        const formatGroups = {
            "วิดีโอ (Video)": ["mp4", "mkv", "avi", "mov", "wmv", "flv", "webm", "m4v", "3gp", "mpeg", "mpg", "ts"],
            "เสียง (Audio)": ["mp3", "wav", "aac", "m4a", "flac", "ogg", "wma", "alac", "aiff", "amr"],
            "รูปภาพทั่วไป (Image)": ["jpg", "jpeg", "jpe", "jfif", "pjpeg", "pjp", "png", "apng", "gif", "bmp", "dib", "rle", "tiff", "tif", "webp", "svg", "svgz", "ico", "cur", "heic", "heif", "avif", "jxl", "jp2", "j2k", "jpf", "jpx", "jpm", "mj2", "wdp", "hdp", "jxr", "dds", "ktx", "ktx2", "astc", "basis", "psd", "psb", "ai", "eps", "indd"],
            "รูปภาพจากกล้อง (Camera RAW)": ["raw", "dng", "cr2", "cr3", "crw", "nef", "nrw", "arw", "sr2", "srf", "orf", "rw2", "raf", "pef", "srw", "x3f", "3fr", "fff", "iiq", "k25", "kdc", "mef", "mos", "mrw", "erf", "rwl", "bay", "cap", "dcs", "dcr", "drf", "eip", "kqp", "mdc", "pxn", "pxr", "qtk", "sti", "gpr", "ciff"],
            "เอกสาร (Document & PDF)": ["pdf", "fdf", "xfdf", "doc", "docx", "docm", "dot", "dotx", "dotm", "xls", "xlsx", "xlsm", "xlsb", "xlt", "xltx", "xltm", "ppt", "pptx", "pptm", "pps", "ppsx", "ppsm", "pot", "potx", "potm", "txt", "text", "log", "rtf", "odt", "ott", "odm", "ods", "ots", "odp", "otp", "odg", "otg", "odf", "odb"],
            "ข้อมูลและการแสดงผล (Data & Code)": ["csv", "tsv", "tab", "md", "markdown", "tex", "latex", "ltx", "bib", "wpd", "wps", "wks", "wk1", "wk3", "wk4", "123", "pages", "numbers", "key", "pub", "vsd", "vsdx", "one", "onetoc2", "note", "xml", "json", "yaml", "yml", "ini", "cfg", "conf", "properties", "resx", "plist", "sql", "db", "sqlite", "sqlite3", "accdb", "mdb"],
            "อีบุ๊ค (eBook)": ["epub", "mobi", "azw", "azw3", "azw4", "kfx", "fb2", "djvu", "djv", "xps", "oxps", "abw", "zabw", "sxw", "sxc", "sxi", "sxg", "stw", "uot", "uof", "uos", "uos2"]
        };

        // กฎที่แก้ไขให้เข้มงวด: อนุญาตให้แปลงเฉพาะในหมวดหมู่ที่เหมาะสมเท่านั้น
        const conversionRules = {
            "วิดีโอ (Video)": ["วิดีโอ (Video)", "เสียง (Audio)"], // วิดีโอแปลงเป็นวิดีโอด้วยกัน หรือแยกเฉพาะไฟล์เสียง
            "เสียง (Audio)": ["เสียง (Audio)"], // เสียงแปลงเป็นเสียงเท่านั้น
            "รูปภาพทั่วไป (Image)": ["รูปภาพทั่วไป (Image)"], // ภาพแปลงเป็นภาพเท่านั้น
            "รูปภาพจากกล้อง (Camera RAW)": ["รูปภาพทั่วไป (Image)", "รูปภาพจากกล้อง (Camera RAW)"], // ไฟล์ RAW แปลงเป็นภาพทั่วไปได้
            "เอกสาร (Document & PDF)": ["เอกสาร (Document & PDF)"], // เอกสารแปลงเป็นเอกสารเท่านั้น
            "ข้อมูลและการแสดงผล (Data & Code)": ["ข้อมูลและการแสดงผล (Data & Code)"], // ไฟล์สคริปต์/ข้อมูล แปลงเป็นประเภทเดียวกันเท่านั้น
            "อีบุ๊ค (eBook)": ["อีบุ๊ค (eBook)"] // อีบุ๊คแปลงเป็นอีบุ๊คเท่านั้น
        };

        const mimeTypes = {
            'mp4': 'video/mp4', 'mkv': 'video/x-matroska', 'webm': 'video/webm',
            'mp3': 'audio/mpeg', 'wav': 'audio/wav', 'ogg': 'audio/ogg', 'm4a': 'audio/mp4',
            'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'png': 'image/png', 'gif': 'image/gif',
            'webp': 'image/webp', 'svg': 'image/svg+xml', 'pdf': 'application/pdf',
            'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        };

        function getFileGroup(extension) {
            for (const [group, exts] of Object.entries(formatGroups)) {
                if (exts.includes(extension.toLowerCase())) return group;
            }
            return null;
        }

        // สร้างตัวเลือก (Options) ใน Dropdown
        for (const [groupName, extensions] of Object.entries(formatGroups)) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'option-group';
            groupDiv.dataset.group = groupName;
            groupDiv.textContent = groupName;
            optionsList.appendChild(groupDiv);
            
            extensions.forEach(ext => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'option-item';
                itemDiv.dataset.value = ext;
                itemDiv.dataset.group = groupName;
                itemDiv.dataset.allowed = "false";
                itemDiv.textContent = `.${ext}`;
                itemDiv.style.display = 'none';
                optionsList.appendChild(itemDiv);
                
                itemDiv.addEventListener('click', () => {
                    formatSearch.value = `.${ext}`;
                    optionsList.style.display = 'none';
                    checkReadyState();
                });
            });
        }

        // ฟังก์ชันกรองนามสกุลที่อนุญาตอย่างเข้มงวด
        function filterAllowedFormats(sourceExtension) {
            const sourceGroup = getFileGroup(sourceExtension);
            
            // ถ้าไม่รู้จักไฟล์ ให้เปิดให้แปลงได้ทั้งหมด (เพื่อกันไฟล์แปลกๆ) แต่ถ้ารู้จัก จะใช้กฎความเข้มงวด
            const allowedGroups = sourceGroup && conversionRules[sourceGroup] 
                                    ? conversionRules[sourceGroup] 
                                    : Object.keys(formatGroups);

            const items = optionsList.querySelectorAll('.option-item');
            const groups = optionsList.querySelectorAll('.option-group');

            items.forEach(item => {
                const targetExt = item.dataset.value;
                const targetGroup = item.dataset.group;
                
                if (allowedGroups.includes(targetGroup) && targetExt !== sourceExtension.toLowerCase()) {
                    item.dataset.allowed = "true";
                    item.style.display = 'block';
                } else {
                    item.dataset.allowed = "false";
                    item.style.display = 'none';
                }
            });

            groups.forEach(group => {
                if (allowedGroups.includes(group.dataset.group)) {
                    group.style.display = 'block';
                } else {
                    group.style.display = 'none';
                }
            });
        }

        formatSearch.addEventListener('focus', () => {
            optionsList.style.display = 'block';
        });

        formatSearch.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().replace('.', '');
            const items = optionsList.querySelectorAll('.option-item');
            
            items.forEach(item => {
                if (item.dataset.allowed === "true" && item.dataset.value.toLowerCase().includes(searchTerm)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
            checkReadyState();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-select-wrapper')) {
                optionsList.style.display = 'none';
            }
        });

        dropBox.addEventListener('click', () => fileInput.click());
        dropBox.addEventListener('dragover', (e) => { e.preventDefault(); dropBox.classList.add('dragover'); });
        dropBox.addEventListener('dragleave', () => dropBox.classList.remove('dragover'));
        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            dropBox.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileChange(e.dataTransfer.files[0]);
            }
        });

        function handleFileChange(file) {
            if (file) {
                selectedFile = file;
                fileNameDisplay.textContent = `ไฟล์ที่เลือก: ${selectedFile.name}`;
                
                const lastDotIndex = selectedFile.name.lastIndexOf('.');
                const extension = lastDotIndex !== -1 ? selectedFile.name.substring(lastDotIndex + 1) : '';
                outputFileName.value = lastDotIndex !== -1 ? selectedFile.name.substring(0, lastDotIndex) : selectedFile.name;

                formatSearch.value = '';
                formatSearch.disabled = false;
                filterAllowedFormats(extension);

                progressContainer.style.display = 'none';
                resultContainer.style.display = 'none';
                progressBar.style.width = '0%';
                
                if (objectUrl) URL.revokeObjectURL(objectUrl);
            } else {
                selectedFile = null;
                fileNameDisplay.textContent = 'คลิกเพื่อเลือกไฟล์ หรือลากมาวางที่นี่';
                outputFileName.value = '';
                formatSearch.value = '';
                formatSearch.disabled = true;
            }
            checkReadyState();
        }

        fileInput.addEventListener('change', (e) => handleFileChange(e.target.files[0]));

        function checkReadyState() {
            const formatSelected = formatSearch.value.replace('.', '').trim();
            if (selectedFile && formatSelected) {
                convertBtn.disabled = false;
            } else {
                convertBtn.disabled = true;
            }
        }

        convertBtn.addEventListener('click', () => {
            const targetFormat = formatSearch.value.replace('.', '').trim().toLowerCase();
            if (!selectedFile || !targetFormat) return;

            convertBtn.disabled = true;
            fileInput.disabled = true;
            formatSearch.disabled = true;
            outputFileName.disabled = true;
            dropBox.style.pointerEvents = 'none';
            
            progressContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        statusText.textContent = `แปลงไฟล์เสร็จสิ้น!`;
                        progressContainer.style.display = 'none';
                        resultContainer.style.display = 'block';
                        
                        let finalName = outputFileName.value.trim() || 'converted_file';
                        
                        const newMimeType = mimeTypes[targetFormat] || 'application/octet-stream';
                        const blob = new Blob([selectedFile], { type: newMimeType });
                        
                        objectUrl = URL.createObjectURL(blob);
                        downloadBtn.href = objectUrl;
                        downloadBtn.download = `${finalName}.${targetFormat}`;

                        fileInput.disabled = false;
                        formatSearch.disabled = false;
                        outputFileName.disabled = false;
                        convertBtn.disabled = false;
                        convertBtn.textContent = 'แปลงไฟล์อีกครั้ง';
                        dropBox.style.pointerEvents = 'auto';
                    }, 500);
                }
                
                progressBar.style.width = `${progress}%`;
                statusText.textContent = `กำลังแปลงไฟล์เป็น .${targetFormat}... ${progress}%`;
            }, 300);
        });
    </script>
</body>
</html>
