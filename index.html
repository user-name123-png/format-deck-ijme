<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media Converter</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #A29BFE;
            --bg-gradient: linear-gradient(135deg, #74EBD5 0%, #9FACE6 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2D3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .converter-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .converter-card h1 {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .converter-card p {
            font-weight: 300;
            margin-bottom: 30px;
            font-size: 14px;
            color: #4a4a4a;
        }

        /* ซ่อน Input แบบเนียนๆ */
        #fileInput {
            display: none;
        }

        .file-upload-box {
            border: 2px dashed var(--primary);
            border-radius: 16px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer; /* เปลี่ยนเมาส์เป็นรูปนิ้วตอนชี้ */
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .file-upload-box:hover, .file-upload-box.dragover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            border-color: #5A4BDE;
        }

        .file-upload-box span {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            color: var(--primary);
            word-break: break-word; /* ป้องกันชื่อไฟล์ยาวเกินกรอบ */
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: border 0.3s;
        }

        select:focus {
            border-color: var(--primary);
        }

        .btn-convert {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-convert:hover {
            background: #5A4BDE;
            transform: translateY(-2px);
        }

        .btn-convert:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-top: 25px;
            text-align: left;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .result-container {
            display: none;
            margin-top: 20px;
        }

        .btn-download {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 24px;
            background: #00b894;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-download:hover {
            background: #00a383;
        }

        /* Responsive Design สำหรับมือถือและจอขนาดเล็ก */
        @media (max-width: 500px) {
            .converter-card {
                padding: 25px 20px; /* ลด Padding ลงเมื่อจอเล็ก */
                border-radius: 16px;
            }

            .converter-card h1 {
                font-size: 20px; /* ลดขนาดฟอนต์ */
            }

            .file-upload-box {
                padding: 30px 15px;
            }

            .file-upload-box svg {
                width: 32px;
                height: 32px;
            }

            .file-upload-box span {
                font-size: 14px;
            }

            select, .btn-convert {
                font-size: 15px;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>แปลงนามสกุลไฟล์</h1>
        <p>รองรับวิดีโอและเสียง (MP4, MKV, MP3, WAV และอื่นๆ)</p>

        <input type="file" id="fileInput" accept="video/*,audio/*,image/*">
        <div class="file-upload-box" id="dropBox">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span id="fileName">คลิกเพื่อเลือกไฟล์ หรือลากมาวางที่นี่</span>
        </div>

        <div class="form-group">
            <label for="formatSelect">เลือกนามสกุลไฟล์ที่ต้องการแปลง</label>
            <select id="formatSelect">
                <optgroup label="Video Formats">
                    <option value="mp4">.mp4</option>
                    <option value="mkv">.mkv</option>
                    <option value="avi">.avi</option>
                    <option value="mov">.mov</option>
                    <option value="wmv">.wmv</option>
                    <option value="flv">.flv</option>
                    <option value="webm">.webm</option>
                    <option value="m4v">.m4v</option>
                    <option value="3gp">.3gp</option>
                    <option value="mpeg">.mpeg / .mpg</option>
                    <option value="ts">.ts</option>
                </optgroup>
                <optgroup label="Audio Formats">
                    <option value="mp3">.mp3</option>
                    <option value="wav">.wav</option>
                    <option value="aac">.aac</option>
                    <option value="m4a">.m4a</option>
                    <option value="flac">.flac</option>
                    <option value="ogg">.ogg</option>
                    <option value="wma">.wma</option>
                    <option value="alac">.alac</option>
                    <option value="aiff">.aiff</option>
                    <option value="amr">.amr</option>
                </optgroup>
            </select>
        </div>

        <button class="btn-convert" id="convertBtn" disabled>เริ่มการแปลงไฟล์</button>

        <div class="progress-container" id="progressContainer">
            <div class="status-text" id="statusText">กำลังเตรียมการ... 0%</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <p>✅ แปลงไฟล์สำเร็จ!</p>
            <a href="#" class="btn-download" id="downloadBtn" download>ดาวน์โหลดไฟล์</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const formatSelect = document.getElementById('formatSelect');
        const dropBox = document.getElementById('dropBox');

        let selectedFile = null;

        // --- จุดที่แก้ไข ---
        // 1. ทำให้คลิกที่กล่องแล้วเปิดหน้าต่างเลือกไฟล์
        dropBox.addEventListener('click', () => {
            fileInput.click();
        });

        // 2. เพิ่มระบบ Drag & Drop ลากไฟล์มาวางได้
        dropBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropBox.classList.add('dragover');
        });

        dropBox.addEventListener('dragleave', () => {
            dropBox.classList.remove('dragover');
        });

        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            dropBox.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files; // โยนไฟล์เข้า input
                handleFileChange(e.dataTransfer.files[0]);
            }
        });

        // ฟังชั่นจัดการเมื่อมีการเลือกหรือลากไฟล์มาวาง
        function handleFileChange(file) {
            if (file) {
                selectedFile = file;
                fileNameDisplay.textContent = `ไฟล์ที่เลือก: ${selectedFile.name}`;
                convertBtn.disabled = false;
                
                // Reset UI
                progressContainer.style.display = 'none';
                resultContainer.style.display = 'none';
                progressBar.style.width = '0%';
            } else {
                selectedFile = null;
                fileNameDisplay.textContent = 'คลิกเพื่อเลือกไฟล์ หรือลากมาวางที่นี่';
                convertBtn.disabled = true;
            }
        }

        // จับ Event เมื่อเลือกไฟล์ผ่านปุ่มคลิก
        fileInput.addEventListener('change', (e) => {
            handleFileChange(e.target.files[0]);
        });
        // --- สิ้นสุดจุดที่แก้ไข ---

        // จำลองระบบแปลงไฟล์
        convertBtn.addEventListener('click', () => {
            if (!selectedFile) return;

            convertBtn.disabled = true;
            fileInput.disabled = true;
            formatSelect.disabled = true;
            dropBox.style.pointerEvents = 'none'; // ปิดการคลิกกล่องระหว่างแปลง
            
            progressContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            
            const targetFormat = formatSelect.value;
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        statusText.textContent = `แปลงไฟล์เสร็จสิ้น!`;
                        progressContainer.style.display = 'none';
                        resultContainer.style.display = 'block';
                        
                        fileInput.disabled = false;
                        formatSelect.disabled = false;
                        convertBtn.disabled = false;
                        convertBtn.textContent = 'แปลงไฟล์อีกครั้ง';
                        dropBox.style.pointerEvents = 'auto'; // เปิดการคลิกกล่องใหม่
                    }, 500);
                }
                
                progressBar.style.width = `${progress}%`;
                statusText.textContent = `กำลังแปลงไฟล์เป็น .${targetFormat}... ${progress}%`;
            }, 400);
        });
    </script>
</body>
</html>
